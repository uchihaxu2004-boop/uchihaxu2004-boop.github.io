<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>大軍的個人網站</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@200;300;400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050506;
      --bg2: #0b0b10;
      --surface: rgba(255,255,255,0.04);
      --surface-2: rgba(255,255,255,0.07);
      --border: rgba(255,255,255,0.10);
      --border-strong: rgba(255,255,255,0.18);
      --text: #f5f5f7;
      --muted: #a1a1aa;
      --muted-2: #6b7280;
      --accent: #ffffff;
      --glow: rgba(255,255,255,0.08);
      --shadow: 0 20px 60px rgba(0,0,0,0.45);
      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-md: 14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background:
        radial-gradient(circle at 20% 10%, rgba(255,255,255,0.08), transparent 20%),
        radial-gradient(circle at 80% 20%, rgba(255,255,255,0.05), transparent 25%),
        radial-gradient(circle at 50% 100%, rgba(255,255,255,0.06), transparent 30%),
        linear-gradient(180deg, var(--bg), var(--bg2));
      color: var(--text);
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
      cursor: none;
      min-height: 100vh;
    }

    /* subtle grain */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 999;
      opacity: 0.26;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.35'/%3E%3C/svg%3E");
      mix-blend-mode: soft-light;
    }

    /* ambient blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.12;
      z-index: 0;
      pointer-events: none;
      animation: float 16s ease-in-out infinite;
    }
    .blob.one { width: 420px; height: 420px; top: -120px; left: -80px; background: #fff; }
    .blob.two { width: 360px; height: 360px; bottom: 10%; right: -80px; background: #8b8b8b; animation-delay: 3s; }
    .blob.three { width: 280px; height: 280px; top: 45%; left: 55%; background: #d7d7d7; animation-delay: 6s; }
    @keyframes float {
      0%,100% { transform: translateY(0) translateX(0) scale(1); }
      50% { transform: translateY(-28px) translateX(20px) scale(1.07); }
    }

    /* cursor */
    #cur {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10000;
      mix-blend-mode: difference;
    }
    #cur .dot, #cur .ring {
      position: absolute;
      border-radius: 50%;
      transform: translate(-50%, -50%);
    }
    #cur .dot {
      width: 10px;
      height: 10px;
      background: #fff;
    }
    #cur .ring {
      width: 42px;
      height: 42px;
      border: 1px solid rgba(255,255,255,0.45);
      transition: width .25s ease, height .25s ease, opacity .25s ease;
      opacity: 0.85;
    }
    body.hovering #cur .dot { width: 14px; height: 14px; }
    body.hovering #cur .ring { width: 62px; height: 62px; opacity: 0.55; }

    /* hero */
    #hero {
      position: relative;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
      border-bottom: 1px solid var(--border);
    }

    #stars {
      position: absolute;
      inset: 0;
      z-index: 1;
      opacity: 0.9;
    }

    .hero-inner {
      position: relative;
      z-index: 2;
      width: min(920px, calc(100vw - 48px));
      padding: 2rem;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.7rem;
      padding: 0.5rem 0.9rem;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
      border-radius: 999px;
      color: var(--muted);
      font-size: 0.68rem;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      margin-bottom: 1.8rem;
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
      opacity: 0;
      animation: rise 0.9s ease 0.15s forwards;
    }

    .eyebrow .dot-small {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 18px rgba(255,255,255,0.7);
    }

    .hero-title {
      font-family: 'Noto Serif TC', serif;
      font-weight: 300;
      font-size: clamp(3.2rem, 10vw, 7.8rem);
      line-height: 1.02;
      letter-spacing: -0.03em;
      color: var(--text);
      text-wrap: balance;
      opacity: 0;
      animation: rise 1s ease 0.35s forwards;
    }

    .hero-title .sub {
      display: block;
      margin-top: 0.75rem;
      font-family: 'Inter', sans-serif;
      font-size: clamp(0.78rem, 1.8vw, 0.95rem);
      font-weight: 400;
      color: var(--muted);
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .hero-copy {
      max-width: 720px;
      margin: 1.8rem auto 0;
      color: #9b9ba4;
      font-size: 0.95rem;
      line-height: 2;
      opacity: 0;
      animation: rise 1s ease 0.55s forwards;
    }

    .hero-actions {
      display: flex;
      gap: 0.9rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 2.3rem;
      opacity: 0;
      animation: rise 1s ease 0.75s forwards;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.92rem 1.25rem;
      border-radius: 999px;
      text-decoration: none;
      font-size: 0.82rem;
      letter-spacing: 0.08em;
      color: var(--text);
      border: 1px solid var(--border-strong);
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(18px);
      transition: transform .25s ease, background .25s ease, border-color .25s ease;
      box-shadow: var(--shadow);
    }

      transform
