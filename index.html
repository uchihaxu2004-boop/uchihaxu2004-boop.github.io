<style>
/* ============================================
   大軍的個人網站 - Life Archive
   ============================================ */

:root {
    --color-bg: #0a0a0a;
    --color-bg-alt: #111111;
    --color-white: #ffffff;
    --color-silver: #c0c0c0;
    --color-silver-dim: #8a8a8a;
    --color-accent: #e8e8e8;
    --font-display: 'Playfair Display', serif;
    --font-body: 'Inter', sans-serif;
    --font-cn: 'Noto Serif TC', serif;
    --transition-smooth: cubic-bezier(0.25, 0.46, 0.45, 0.94);
    --transition-bounce: cubic-bezier(0.68, -0.55, 0.265, 1.55);
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; font-size: 16px; }

body {
    font-family: var(--font-body);
    background: var(--color-bg);
    color: var(--color-white);
    overflow-x: hidden;
}

/* Noise Overlay */
.noise-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 9000; opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
}


/* Sections */
.section { padding: 5rem 3rem 3rem; position: relative; }
.section-header { margin-bottom: 2rem; position: relative; display: flex; align-items: baseline; gap: 1.25rem; }
.section-number { font-family: var(--font-display); font-size: 0.875rem; color: var(--color-silver-dim); letter-spacing: 0.2em; }
.section-title { font-family: var(--font-display); font-size: clamp(1.75rem, 4vw, 3rem); font-weight: 400; color: var(--color-white); line-height: 1.1; margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 0.15em; }
.section-subtitle { font-size: 1rem; color: var(--color-silver-dim); font-weight: 300; letter-spacing: 0.05em; }

/* Home */
.home { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; position: relative; overflow: hidden; }
.home-content { z-index: 3; position: relative; }
.home-title { margin-bottom: 2rem; }
.title-cn { display: block; font-family: var(--font-cn); font-size: clamp(2rem, 5vw, 3.5rem); color: var(--color-white); letter-spacing: 0.15em; margin-bottom: 1.5rem; animation: fadeInUp 1s var(--transition-smooth); text-shadow: 0 2px 30px rgba(0,0,0,0.8); }
.title-en { display: block; font-family: var(--font-display); font-size: clamp(1.125rem, 2.5vw, 1.5rem); font-style: italic; color: var(--color-silver); font-weight: 400; letter-spacing: 0.05em; position: relative; animation: fadeInUp 1s 0.2s var(--transition-smooth) backwards; }
.title-en::after { content: attr(data-text); position: absolute; top: 0; left: 0; width: 100%; color: var(--color-white); clip-path: inset(0 100% 0 0); animation: revealText 2s 1s var(--transition-smooth) forwards; }
.home-desc { font-size: 1rem; color: var(--color-silver-dim); max-width: 400px; margin: 0 auto 3rem; line-height: 1.8; animation: fadeInUp 1s 0.4s backwards; }

/* Symbol Pattern Background */
.symbol-bg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
    pointer-events: none;
    overflow: hidden;
}
.symbol-bg svg {
    width: 100%;
    height: 100%;
    display: block;
}
.symbol-bg::after {
    /* very subtle vignette to focus eye on title */
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, rgba(10,10,10,0.55) 0%, rgba(10,10,10,0.25) 45%, rgba(10,10,10,0) 80%);
    pointer-events: none;
}
.symbol {
    transition: opacity .3s ease;
}
.symbol > * {
    fill: none;
    stroke: #c8c8c8;
    stroke-width: 2;
    stroke-linejoin: round;
    stroke-linecap: round;
    vector-effect: non-scaling-stroke;
    filter: drop-shadow(0 0 1px rgba(255,255,255,0.4));
}
.symbol:hover { opacity: 1 !important; }
.symbol:hover > * { stroke: var(--color-white); }
@keyframes symbolPulse {
    0%, 100% { opacity: var(--op, 0.6); }
    50%       { opacity: calc(var(--op, 0.6) * 0.55); }
}

/* Buttons */
.btn { display: inline-flex; align-items: center; gap: 1rem; padding: 1rem 2.5rem; text-decoration: none; font-size: 0.875rem; text-transform: uppercase; letter-spacing: 0.2em; position: relative; overflow: hidden; cursor: pointer; border: none; background: transparent; color: var(--color-white); }
.btn-primary { border: 1px solid var(--color-white); transition: all 0.4s var(--transition-smooth); }
.btn-primary::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--color-white); transform: translateX(-100%); transition: transform 0.4s var(--transition-smooth); z-index: -1; }
.btn-primary:hover { color: var(--color-bg); }
.btn-primary:hover::before { transform: translateX(0); }
.btn-arrow { width: 20px; height: 20px; transition: transform 0.3s; }
.btn-primary:hover .btn-arrow { transform: translate(4px, -4px); }

.scroll-indicator { position: absolute; bottom: 2.5rem; left: 50%; transform: translateX(-50%); z-index: 3; cursor: pointer; background: transparent; border: none; padding: 0.75rem; color: var(--color-silver-dim); transition: color var(--transition-smooth), transform var(--transition-smooth); animation: fadeInUp 1s 0.6s backwards; }
.scroll-indicator:hover { color: var(--color-white); }
.scroll-arrow { display: block; width: 28px; height: 44px; animation: scrollBounce 2.2s ease-in-out infinite; }
.scroll-arrow path { stroke: currentColor; stroke-width: 1.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }

/* Photo Cards */
.photo-card {
    position: relative;
    background: var(--color-bg-alt);
    border: 2px solid #b0b0b0;
    transform-style: preserve-3d;
    perspective: 1000px;
    transition: box-shadow 0.3s var(--transition-smooth);
}
.photo-card:hover { box-shadow: 0 0 20px rgba(180,180,180,0.08); }

/* ── METALLIC GLOSS ── */
.card-gloss {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 10;
    opacity: 0;
    transition: opacity 0.35s ease;
    border-radius: inherit;
}
.photo-card:hover .card-gloss {
    opacity: 1;
}

/* ── FILM STRIP CARDS (Log) ── */
.film-card {
    border: none !important;
    background: transparent !important;
    padding: 0 !important;
    overflow: visible !important;
}
.film-card .card-gloss { border-radius: 4px; }
.film-frame {
    position: relative;
    width: 100%;
    height: 100%;
    background: linear-gradient(160deg, #2a2a2a 0%, #1a1a1a 40%, #222 100%);
    border-radius: 4px;
    border: 1.5px solid #555;
    box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.12),
        inset 0 -1px 0 rgba(0,0,0,0.6),
        0 4px 24px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
    overflow: hidden;
}
/* sprocket strip top */
.film-strip-top, .film-strip-bot {
    flex-shrink: 0;
    height: 18px;
    background: linear-gradient(180deg, #1c1c1c, #141414);
    border-top: 1px solid #444;
    border-bottom: 1px solid #444;
    display: flex;
    align-items: center;
    padding: 0 6px;
    gap: 7px;
}
.film-strip-bot { border-top: 1px solid #444; border-bottom: none; }
.sprocket {
    width: 9px; height: 7px;
    background: #0a0a0a;
    border-radius: 1.5px;
    border: 1px solid #383838;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
    flex-shrink: 0;
}
/* exposure window */
.film-exposure {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 10px;
    background:
        linear-gradient(135deg, rgba(200,200,190,0.03) 0%, transparent 60%),
        radial-gradient(ellipse at 30% 30%, rgba(220,215,200,0.04) 0%, transparent 65%),
        #111;
    padding: 12px;
}
.film-exposure svg {
    width: 28px; height: 28px;
    color: rgba(190,185,175,0.45);
}
.film-label {
    font-family: var(--font-display);
    font-size: 0.5rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: rgba(185,180,170,0.5);
    font-style: normal;
}

/* ── POLAROID CARDS (Adventures) ── */
.polaroid-card {
    border: none !important;
    background: transparent !important;
    padding: 0 !important;
    overflow: visible !important;
}
.polaroid-card .card-gloss { border-radius: 3px 3px 6px 6px; }
.polaroid-frame {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    /* brushed aluminium: tight repeating highlight + base gradient */
    background:
        repeating-linear-gradient(
            92deg,
            rgba(255,255,255,0)    0px,
            rgba(255,255,255,0.06) 1px,
            rgba(255,255,255,0)    2px,
            rgba(255,255,255,0)    5px
        ),
        linear-gradient(
            160deg,
            #e2e2e0 0%,
            #c8c8c6 18%,
            #d8d8d6 32%,
            #b8b8b6 48%,
            #cecece 62%,
            #a8a8a6 78%,
            #d4d4d2 100%
        );
    border-radius: 3px 3px 6px 6px;
    box-shadow:
        inset 0 1.5px 0 rgba(255,255,255,0.85),
        inset 1px 0   0 rgba(255,255,255,0.45),
        inset -1px 0  0 rgba(0,0,0,0.18),
        inset 0 -2px 0 rgba(0,0,0,0.22),
        0 10px 40px rgba(0,0,0,0.6),
        0 2px 8px rgba(0,0,0,0.4);
    padding: 7px 7px 0 7px;
}
/* photo window */
.polaroid-window {
    flex: 1;
    background:
        linear-gradient(135deg, rgba(160,155,145,0.07) 0%, transparent 55%),
        radial-gradient(ellipse at 35% 30%, rgba(210,205,195,0.05) 0%, transparent 65%),
        #0f0f0f;
    border: 1px solid rgba(80,80,76,0.3);
    box-shadow: inset 0 2px 8px rgba(0,0,0,0.5), inset 0 0 1px rgba(0,0,0,0.8);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
}
.polaroid-window svg {
    width: 26px; height: 26px;
    color: rgba(150,145,138,0.5);
}
.polaroid-window .film-label {
    color: rgba(145,140,132,0.55);
}
/* caption bar — same brushed metal */
.polaroid-bar {
    flex-shrink: 0;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-top: 1px solid rgba(100,100,98,0.25);
}
/* large polaroid */
.polaroid-card.large .polaroid-frame { padding: 10px 10px 0 10px; }
.polaroid-card.large .polaroid-bar { height: 46px; }
.polaroid-card.large .polaroid-window svg { width: 36px; height: 36px; }
.card-inner { padding: 3rem 2rem; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 280px; text-align: center; }
.card-glare { position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.03), transparent); transition: left 0.5s; pointer-events: none; }
.photo-card:hover .card-glare { left: 100%; }
.placeholder-icon { width: 48px; height: 48px; color: var(--color-silver-dim); margin-bottom: 1.5rem; transition: color 0.3s, transform 0.3s var(--transition-bounce); }
.placeholder-icon.large { width: 64px; height: 64px; }
.photo-card:hover .placeholder-icon { color: var(--color-white); transform: scale(1.1); }
.placeholder-text { font-size: 1rem; color: var(--color-silver); text-transform: uppercase; letter-spacing: 0.2em; margin-bottom: 0.5rem; }
.placeholder-sub { display: none; }

.gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; max-width: 1200px; margin: 0 auto; }

/* ── SITE INTRO ── */
.site-intro {
    padding: 5rem 3rem;
    display: flex;
    justify-content: center;
    align-items: center;
}
.site-intro-inner {
    max-width: 680px;
    text-align: center;
}
.site-intro-label {
    font-family: var(--font-display);
    font-size: 0.75rem;
    letter-spacing: 0.25em;
    color: var(--color-silver-dim);
    text-transform: uppercase;
    margin-bottom: 1.5rem;
}
.site-intro-text {
    font-family: var(--font-display);
    font-size: clamp(1.1rem, 2vw, 1.4rem);
    font-style: italic;
    font-weight: 400;
    color: var(--color-silver);
    line-height: 1.8;
    letter-spacing: 0.02em;
}

/* ── HORIZONTAL SCROLLER (Apple-Music-style Log) ── */
.log-section { padding: 5rem 0 3rem; }
.log-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    max-width: 1400px;
    margin: 0 auto 1.75rem;
    padding: 0 3rem;
}

/* Adventures — same header alignment as Log */
.adv-section { padding: 5rem 0 3rem; }
.adv-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    max-width: 1400px;
    margin: 0 auto 1.75rem;
    padding: 0 3rem;
}
.log-title-row {
    display: flex;
    align-items: baseline;
    gap: 1.25rem;
    cursor: pointer;
    user-select: none;
    background: transparent;
    border: none;
    padding: 0;
    color: inherit;
    text-align: left;
}
.log-title-row .section-number { margin-bottom: 0; }
.log-title-row .section-title {
    margin-bottom: 0;
}

.log-nav-buttons { display: flex; gap: 0.5rem; }
.log-nav-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--color-silver);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background 0.25s, color 0.25s, opacity 0.25s, transform 0.2s;
}
.log-nav-btn:hover:not(:disabled) { background: rgba(255,255,255,0.15); color: var(--color-white); }
.log-nav-btn:active:not(:disabled) { transform: scale(0.92); }
.log-nav-btn:disabled { opacity: 0.25; cursor: default; }
.log-nav-btn svg { width: 16px; height: 16px; }

.log-scroller-wrap {
    position: relative;
    max-width: 1400px;
    margin: 0 auto;
}
.log-scroller {
    display: flex;
    gap: 1.5rem;
    overflow-x: auto;
    overflow-y: hidden;
    scroll-snap-type: x mandatory;
    scroll-padding-left: 3rem;
    scroll-behavior: smooth;
    scrollbar-width: none;
    padding: 0.5rem 3rem 1.5rem;
    -webkit-overflow-scrolling: touch;
}
.log-scroller::-webkit-scrollbar { display: none; }

.log-card {
    flex: 0 0 auto;
    width: 240px;
    scroll-snap-align: start;
    text-decoration: none;
    color: inherit;
    cursor: pointer;
    transition: transform 0.35s var(--transition-smooth);
}
.log-card:hover { transform: translateY(-4px); }
.log-cover {
    width: 240px; height: 240px;
    border-radius: 10px;
    background: linear-gradient(160deg, #1f1f1f 0%, #141414 50%, #1a1a1a 100%);
    border: 1px solid rgba(255,255,255,0.06);
    overflow: hidden;
    position: relative;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    transition: box-shadow 0.35s var(--transition-smooth);
}
.log-card:hover .log-cover { box-shadow: 0 14px 40px rgba(0,0,0,0.7); }
.log-cover .corner-mark {
    position: absolute; top: 10px; right: 12px;
    font-family: var(--font-display);
    font-size: 0.55rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
}
.log-cover .cover-glyph {
    font-family: var(--font-display);
    font-size: 3.5rem;
    color: rgba(255,255,255,0.85);
    font-style: italic;
    letter-spacing: -0.04em;
}
.log-cover .cover-subglyph {
    position: absolute; bottom: 14px; left: 14px;
    font-family: 'SF Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.4);
}
.log-meta {
    margin-top: 0.9rem;
    display: flex; flex-direction: column;
    gap: 0.2rem;
}
.log-meta-title {
    font-family: var(--font-display);
    font-size: 0.95rem;
    color: var(--color-white);
    letter-spacing: 0.04em;
    line-height: 1.2;
}
.log-meta-sub {
    font-size: 0.78rem;
    color: var(--color-silver-dim);
    letter-spacing: 0.05em;
}

/* "More" card — just the button, no frame */
.log-card.more .log-cover {
    background: transparent;
    border: none;
    box-shadow: none;
    flex-direction: column;
    gap: 0.6rem;
}
.log-card.more:hover .log-cover {
    box-shadow: none;
}
.log-card.more .more-icon {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.4);
    display: flex; align-items: center; justify-content: center;
    color: var(--color-silver);
    transition: border-color 0.3s, color 0.3s, transform 0.35s var(--transition-smooth);
}
.log-card.more:hover .more-icon { color: var(--color-white); border-color: var(--color-white); transform: rotate(45deg); }
.log-card.more .more-icon svg { width: 18px; height: 18px; }
.log-card.more .more-label {
    font-size: 0.75rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--color-silver);
}

/* Edge fade overlays */
.log-fade {
    position: absolute;
    top: 0; bottom: 0;
    width: 90px;
    pointer-events: none;
    z-index: 2;
    opacity: 0;
    transition: opacity 0.3s;
}
.log-fade.left  { left: 0;  background: linear-gradient(90deg, var(--color-bg) 0%, rgba(10,10,10,0.85) 35%, rgba(10,10,10,0) 100%); }
.log-fade.right { right: 0; background: linear-gradient(-90deg, var(--color-bg) 0%, rgba(10,10,10,0.85) 35%, rgba(10,10,10,0) 100%); }
.log-fade.show { opacity: 1; }

@media (max-width: 768px) {
    .log-header { padding: 0 1.5rem; }
    .log-scroller { padding: 0.5rem 1.5rem 1.5rem; gap: 1rem; }
    .log-card, .log-cover { width: 180px; }
    .log-cover { height: 180px; }
    .log-fade { width: 50px; }
    .log-nav-buttons { display: none; }
}

.daily { background: var(--color-bg); }
.adventure { background: var(--color-bg); }

/* ── ADVENTURES HORIZONTAL SCROLL AREA ── */
.adventure-scroll {
    max-width: 1400px;
    margin: 0 auto;
    overflow-x: auto;
    overflow-y: hidden;
    position: relative;
    scrollbar-width: none;
}
.adventure-scroll::-webkit-scrollbar { display: none; }

.adventure-inner {
    display: flex;
    align-items: flex-start;
    gap: 0;
    padding: 0.5rem 3rem 1.5rem;
    width: max-content;
    scroll-padding-left: 3rem;
}

.adv-item {
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    width: 270px;
    text-decoration: none;
    color: inherit;
    cursor: pointer;
    transition: transform 0.35s var(--transition-smooth);
}
.adv-item:hover { transform: translateY(-4px); }
.adv-thumb {
    width: 270px; height: 360px;
    border-radius: 10px;
    background: linear-gradient(155deg, #1f1f1f 0%, #141414 50%, #1a1a1a 100%);
    border: 1px solid rgba(255,255,255,0.06);
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    transition: box-shadow 0.35s var(--transition-smooth);
}
.adv-item:hover .adv-thumb { box-shadow: 0 14px 40px rgba(0,0,0,0.7); }
.adv-thumb .adv-glyph {
    font-family: var(--font-display);
    font-size: 3.5rem;
    color: rgba(255,255,255,0.85);
    font-style: italic;
}
.adv-meta { margin-top: 0.9rem; padding: 0 0.1rem; }
.adv-title {
    font-family: var(--font-display);
    font-size: 0.95rem;
    color: var(--color-white);
    letter-spacing: 0.04em;
    line-height: 1.25;
    margin-bottom: 0.3rem;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.adv-location {
    font-size: 0.72rem;
    color: var(--color-silver-dim);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    display: flex; align-items: center; gap: 0.4rem;
    margin-bottom: 0.2rem;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.adv-location svg { width: 11px; height: 11px; opacity: 0.7; flex-shrink: 0; }
.adv-date {
    font-family: var(--font-display);
    font-size: 0.72rem;
    color: var(--color-silver-dim);
    letter-spacing: 0.18em;
    white-space: nowrap;
}

/* gap between items (replaces separators) */
.adv-separator {
    width: 1.5rem;
    flex-shrink: 0;
}

.adv-more {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.85rem;
    flex-shrink: 0;
    width: 270px;
    height: 360px;
    text-decoration: none;
    cursor: pointer;
}
.adv-more-icon {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.4);
    display: flex; align-items: center; justify-content: center;
    color: var(--color-silver);
    transition: border-color 0.3s, color 0.3s, transform 0.35s var(--transition-smooth);
}
.adv-more:hover .adv-more-icon { color: var(--color-white); border-color: var(--color-white); transform: rotate(45deg); }
.adv-more-icon svg { width: 18px; height: 18px; }
.adv-more-label {
    font-size: 0.75rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--color-silver);
    transition: color 0.3s;
}
.adv-more:hover .adv-more-label { color: var(--color-white); }

@media (max-width: 768px) {
    .adventure-inner { padding: 0.5rem 1.5rem 1.5rem; }
    .adv-item, .adv-thumb, .adv-more { width: 195px; }
    .adv-thumb, .adv-more { height: 260px; }
    .adv-separator { width: 1rem; }
}
.adventure-layout { display: grid; grid-template-columns: 2fr 1fr; gap: 1.5rem; max-width: 1200px; margin: 0 auto; }
.adventure-main .photo-card { min-height: 500px; }
.adventure-side { display: flex; flex-direction: column; gap: 1.5rem; }
.adventure-side .photo-card { flex: 1; }

.upload-hint { text-align: center; margin-top: 3rem; }
.upload-hint p { font-size: 0.875rem; color: var(--color-silver-dim); }
.upload-hint code { background: rgba(255, 255, 255, 0.05); padding: 0.25rem 0.75rem; border-radius: 4px; font-family: 'SF Mono', monospace; color: var(--color-silver); }

.portfolio { background: var(--color-bg); }
.portfolio-list { max-width: 1000px; margin: 0 auto; }
.portfolio-item { display: grid; grid-template-columns: 100px 1fr 150px 60px; align-items: center; padding: 2rem 0; border-bottom: 1px solid rgba(255, 255, 255, 0.08); cursor: pointer; position: relative; transition: padding 0.3s var(--transition-smooth); }
.portfolio-item::before { content: ''; position: absolute; left: 0; bottom: 0; width: 0; height: 1px; background: var(--color-white); transition: width 0.4s var(--transition-smooth); }
.portfolio-item:hover { padding: 2.5rem 0; }
.portfolio-item:hover::before { width: 100%; }
.portfolio-year { font-family: var(--font-display); font-size: 0.875rem; color: var(--color-silver-dim); }
.portfolio-name { font-family: var(--font-display); font-size: 1.75rem; font-weight: 400; color: var(--color-white); transition: transform 0.3s var(--transition-smooth); }
.portfolio-item:hover .portfolio-name { transform: translateX(20px); }
.portfolio-type { font-size: 0.875rem; color: var(--color-silver); text-transform: uppercase; letter-spacing: 0.1em; }
.portfolio-arrow { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--color-silver-dim); border-radius: 50%; transition: all 0.3s var(--transition-smooth); }
.portfolio-arrow svg { width: 16px; height: 16px; transition: transform 0.3s; }
.portfolio-item:hover .portfolio-arrow { background: var(--color-white); border-color: var(--color-white); }
.portfolio-item:hover .portfolio-arrow svg { transform: rotate(45deg); stroke: var(--color-bg); }

/* ── NEWSLETTER BAR ── */
.member {
    background: var(--color-bg);
    min-height: auto !important;
    padding: 3.5rem 3rem !important;
    border-top: 1px solid rgba(255,255,255,0.06);
    border-bottom: 1px solid rgba(255,255,255,0.06);
}
.member-container {
    display: grid;
    grid-template-columns: minmax(160px, 200px) 1fr 1fr auto;
    align-items: center;
    gap: 2.5rem;
    max-width: 1400px;
    margin: 0 auto;
    width: 100%;
}
.member-header {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
}
.member-header .section-number {
    display: block;
    font-family: var(--font-display);
    font-size: 0.875rem;
    color: var(--color-silver-dim);
    letter-spacing: 0.2em;
    margin-bottom: 0;
}
.member-header .section-title {
    margin-bottom: 0;
    font-family: var(--font-display);
    font-size: clamp(1.75rem, 4vw, 3rem);
    font-weight: 400;
    color: var(--color-white);
    line-height: 1.1;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    font-style: normal;
}

/* form: use display:contents so each child becomes a direct grid column */
.member-form { display: contents; }

.form-group {
    position: relative;
    margin-bottom: 0;
}
.form-group input {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid rgba(255,255,255,0.18);
    padding: 0.75rem 0;
    font-size: 0.875rem;
    color: var(--color-white);
    font-family: var(--font-display);
    font-style: normal;
    letter-spacing: 0.08em;
    transition: border-color 0.3s;
    outline: none;
}
.form-group input::placeholder {
    color: var(--color-silver-dim);
    font-family: var(--font-display);
    font-style: normal;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-size: 0.875rem;
}
.form-group input:focus {
    border-bottom-color: var(--color-white);
}
/* hide the floating label — placeholder does the job */
.form-group label { display: none; }
.form-line { display: none; }

/* Subscribe button */
.btn-submit {
    width: auto;
    white-space: nowrap;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.35);
    padding: 0.85rem 2rem;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.22em;
    color: var(--color-silver);
    font-family: 'SF Mono', 'Menlo', monospace;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: color 0.3s, border-color 0.3s, background 0.3s;
}
.btn-submit:hover {
    color: var(--color-bg);
    background: var(--color-white);
    border-color: var(--color-white);
}
.btn-loading { display: none; }
.btn-submit.loading .btn-text { display: none; }
.btn-submit.loading .btn-loading { display: inline; }

.form-success {
    display: none;
    grid-column: 2 / -1;
    font-family: var(--font-display);
    font-style: italic;
    font-size: 1rem;
    color: var(--color-silver);
    padding: 0.5rem 0;
}
.form-success.show { display: block; animation: fadeInUp 0.5s; }
.form-success svg { display: none; }
.form-success p { margin: 0; }

.footer { padding: 4rem 3rem; background: var(--color-bg); border-top: 1px solid rgba(255, 255, 255, 0.05); position: relative; }
.footer-content { max-width: 1400px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; gap: 2rem; }
.social-row { display: flex; list-style: none; gap: 2.25rem; padding: 0; margin: 0; align-items: center; }
.social-link { display: inline-flex; align-items: center; justify-content: center; width: 44px; height: 44px; color: var(--color-silver); text-decoration: none; border-radius: 50%; transition: color 0.3s var(--transition-smooth), transform 0.3s var(--transition-smooth), background 0.3s; }
.social-link svg { width: 22px; height: 22px; display: block; }
.social-link:hover { color: var(--color-bg); background: var(--color-white); transform: translateY(-3px); }
.footer-year { font-size: 0.7rem; color: var(--color-silver-dim); text-transform: uppercase; letter-spacing: 0.3em; }
.footer-line { position: absolute; bottom: 0; left: 0; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, var(--color-silver-dim), transparent); opacity: 0.3; }

@keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
@keyframes revealText { to { clip-path: inset(0 0 0 0); } }
@keyframes scrollBounce {
    0%, 100% { transform: translateY(0); opacity: 0.55; }
    50%       { transform: translateY(10px); opacity: 1; }
}
@keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
@keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }

.reveal { opacity: 0; transform: translateY(40px); transition: opacity 0.8s var(--transition-smooth), transform 0.8s var(--transition-smooth); }
.reveal.active { opacity: 1; transform: translateY(0); }

@media (max-width: 1024px) {
    .adventure-layout { grid-template-columns: 1fr; }
    .adventure-main .photo-card { min-height: 350px; }
}
@media (max-width: 900px) {
    .member-container {
        grid-template-columns: 1fr 1fr;
        gap: 1.5rem;
    }
    .member-header { grid-column: 1 / -1; }
    .form-success { grid-column: 1 / -1; }
}
@media (max-width: 768px) {
    .section { padding: 6rem 1.5rem 3rem; }
    .portfolio-item { grid-template-columns: 60px 1fr; gap: 0.5rem; }
    .portfolio-type, .portfolio-arrow { display: none; }
    .member { padding: 2.5rem 1.5rem !important; }
    .member-container { grid-template-columns: 1fr; gap: 1.25rem; }
    .btn-submit { width: 100%; }
}

/* ── SUNFLOWER BG ── */
.sunflower-bg {
    position: absolute;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    overflow: hidden;
}
.sf-img {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 100%;
    height: 100%;
    object-fit: cover;
}
.sunflower-vignette {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 52%,
        rgba(10,10,10,0.0) 0%,
        rgba(10,10,10,0.0) 40%,
        rgba(10,10,10,0.35) 75%,
        rgba(10,10,10,0.65) 100%
    );
    pointer-events: none;
}



/* ============================================
   Home hero — Claude-style greeting + search (mono)
   ============================================ */
.cl-hero { position: relative; z-index: 2; width: 100%; max-width: 760px; padding: 0 1.5rem; }

.cl-greeting { display: flex; align-items: center; justify-content: center; white-space: nowrap; font-family: var(--font-display); font-weight: 400; font-size: clamp(1.1rem, 4.6vw, 3rem); line-height: 1.1; color: var(--color-silver); letter-spacing: 0.01em; margin-bottom: 2.75rem; animation: fadeInUp 0.9s var(--transition-smooth) backwards; }
.cl-name { font-family: var(--font-cn); color: #f5f5f5; }

.cl-form { position: relative; text-align: left; animation: fadeInUp 0.9s 0.12s var(--transition-smooth) backwards; }
.cl-box { display: flex; flex-direction: column; justify-content: space-between; min-height: 132px; background: rgba(255, 255, 255, 0.045); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 0.85rem 1.1rem 0.85rem; transition: border-color 0.3s var(--transition-smooth), background 0.3s; }
.cl-form:focus-within .cl-box { border-color: rgba(255, 255, 255, 0.28); background: rgba(255, 255, 255, 0.06); }
.cl-input { width: 100%; background: transparent; border: none; outline: none; color: var(--color-white); font-family: var(--font-body); font-size: 1.05rem; line-height: 1.5; padding: 0.2rem 0.2rem 0; }
.cl-input::placeholder { color: var(--color-silver-dim); }
.cl-box-bottom { display: flex; align-items: center; justify-content: space-between; gap: 0.85rem; margin-top: 0.7rem; }
.cl-submit { width: 36px; height: 36px; flex: none; border-radius: 50%; border: none; background: var(--color-white); color: #0a0a0a; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.25s var(--transition-bounce), opacity 0.25s; }
.cl-submit:hover { transform: scale(1.08); }
.cl-submit svg { width: 17px; height: 17px; }

/* 搜尋建議下拉 */
.cl-suggest { position: absolute; left: 0; right: 0; top: calc(100% + 0.6rem); list-style: none; background: #141414; border: 1px solid rgba(255, 255, 255, 0.12); border-radius: 16px; padding: 0.5rem; box-shadow: 0 24px 60px rgba(0, 0, 0, 0.6); z-index: 20; }
.cl-suggest[hidden] { display: none; }
.cl-sg { display: flex; align-items: center; gap: 0.9rem; padding: 0.8rem 1rem; border-radius: 10px; text-decoration: none; transition: background 0.2s; }
.cl-sg:hover, .cl-sg.is-top { background: rgba(255, 255, 255, 0.05); }
.cl-sg-t { font-family: var(--font-display); font-size: 1rem; color: var(--color-white); }
.cl-sg-d { flex: 1; font-size: 0.82rem; color: var(--color-silver-dim); }
.cl-sg-arrow { font-family: var(--font-display); color: var(--color-silver); }

/* 膠囊（通往各頁） */
.cl-link-menu { flex: 1; position: relative; }
.cl-menu-toggle { display: none; }
.cl-pills { display: flex; flex-wrap: wrap; gap: 0.5rem; justify-content: flex-start; margin-top: 0; }
.cl-pill { display: inline-flex; align-items: center; justify-content: center; min-height: 36px; padding: 0.48rem 0.85rem; border: 1px solid rgba(255, 255, 255, 0.18); border-radius: 8px; color: var(--color-silver); font-family: var(--font-display); font-size: 0.74rem; font-weight: 400; letter-spacing: 0.15em; text-transform: uppercase; text-decoration: none; transition: color 0.3s, border-color 0.3s; }
.cl-pill:hover { color: var(--color-white); border-color: var(--color-silver); }
.cl-pill-join { position: relative; overflow: hidden; }
.cl-pill-join .cta-default { transition: opacity 0.15s; }
.cl-pill-join .cta-hover { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); opacity: 0; transition: opacity 0.15s; }
.cl-pill-join:hover .cta-default { opacity: 0; }
.cl-pill-join:hover .cta-hover { opacity: 1; }

@media (max-width: 600px) {
    .cl-box { min-height: 104px; border-radius: 18px; padding: 0.7rem 0.85rem 0.65rem; }
    .cl-input { line-height: 1.35; padding-top: 0.1rem; }
    .cl-box-bottom { align-items: center; gap: 0.55rem; margin-top: 0.45rem; }
    .cl-menu-toggle { width: min(158px, 100%); min-height: 32px; display: inline-flex; align-items: center; justify-content: space-between; gap: 0.65rem; border: 1px solid rgba(255, 255, 255, 0.18); border-radius: 8px; background: transparent; color: var(--color-silver); font-family: var(--font-display); font-size: 0.68rem; letter-spacing: 0.16em; text-transform: uppercase; padding: 0 0.75rem; cursor: pointer; transition: color 0.3s, border-color 0.3s, background 0.3s; }
    .cl-menu-toggle:hover,
    .cl-link-menu.open .cl-menu-toggle { color: var(--color-white); border-color: rgba(255, 255, 255, 0.34); background: rgba(255, 255, 255, 0.04); }
    .cl-menu-toggle svg { width: 13px; height: 13px; flex: none; transition: transform 0.25s var(--transition-smooth); }
    .cl-link-menu.open .cl-menu-toggle svg { transform: rotate(180deg); }
    .cl-pills { position: absolute; left: 0; top: calc(100% + 0.55rem); width: min(210px, calc(100vw - 5rem)); display: none; flex-direction: column; gap: 0.35rem; padding: 0.45rem; border: 1px solid rgba(255, 255, 255, 0.14); border-radius: 14px; background: #141414; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.55); z-index: 30; }
    .cl-link-menu.open .cl-pills { display: flex; }
    .cl-pill { width: 100%; min-height: 34px; justify-content: flex-start; padding: 0.5rem 0.75rem; font-size: 0.7rem; }
}
</style>
</head>
<body>


    <!-- Home Section -->
    <section id="home" class="section home">
        <div class="cl-hero">
            <h1 class="cl-greeting">
                <span id="greetText">Welcome to <span class="cl-name">大軍</span>'s Life Archive</span>
            </h1>

            <form class="cl-form" id="searchBox" role="search">
                <div class="cl-box">
                    <input type="text" id="searchInput" class="cl-input" autocomplete="off"
                           placeholder="What are you looking for?" aria-label="Search the archive">
                    <div class="cl-box-bottom">
                        <div class="cl-link-menu" id="clLinkMenu">
                            <button type="button" class="cl-menu-toggle" id="clMenuToggle" aria-expanded="false" aria-controls="clQuickLinks">
                                <span>Menu</span>
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 9l6 6 6-6"/></svg>
                            </button>
                            <div class="cl-pills" id="clQuickLinks">
                                <a class="cl-pill" href="index.html">Home</a>
                                <a class="cl-pill" href="log.html">Log</a>
                                <a class="cl-pill" href="adventures.html">Adventures</a>
                                <a class="cl-pill" href="craft.html">Craft</a>
                                <a class="cl-pill" href="reach.html">Reach</a>
                                <a class="cl-pill cl-pill-join" href="join.html"><span class="cta-default">Join</span><span class="cta-hover">VIP</span></a>
                            </div>
                        </div>
                        <button type="submit" class="cl-submit" aria-label="Search">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M13 6l6 6-6 6"/></svg>
                        </button>
                    </div>
                </div>
                <ul class="cl-suggest" id="suggest" hidden></ul>
            </form>
        </div>
        <div class="noise-overlay"></div>
    </section>

<script>
/* 時段問候 + 站內搜尋 */
function initHomeSearch() {
    const form = document.getElementById('searchBox');
    if (!form) return;
    const input = document.getElementById('searchInput');
    const list = document.getElementById('suggest');
    const linkMenu = document.getElementById('clLinkMenu');
    const menuToggle = document.getElementById('clMenuToggle');
    const INDEX = [
        { t: 'Log',        url: 'log.html',        d: 'Daily life · photo journal',   k: 'log daily life photo photos journal diary 日常 日記 照片 生活' },
        { t: 'Adventures', url: 'adventures.html', d: 'Travels by country & place',    k: 'adventures travel trips places country countries 旅遊 旅行 國家 地方' },
        { t: 'Craft',      url: 'craft.html',      d: 'Projects, reports & work',      k: 'craft projects project work reports portfolio 作品 報告 專案' },
        { t: 'Reach',      url: 'reach.html',      d: 'Find me across the web',        k: 'reach contact email social links 聯絡 社群' },
        { t: 'Join',       url: 'join.html',       d: 'Subscribe to the letter',       k: 'join subscribe newsletter member letter 訂閱 會員' },
    ];
    function esc(s) { return s.replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])); }
    function render() {
        const q = input.value.trim().toLowerCase();
        const items = q === '' ? [] : INDEX.filter(x => (x.t + ' ' + x.k + ' ' + x.d).toLowerCase().includes(q));
        if (!items.length) { list.hidden = true; list.innerHTML = ''; return; }
        list.innerHTML = items.map((x, i) =>
            `<li><a class="cl-sg${i === 0 ? ' is-top' : ''}" href="${x.url}">` +
            `<span class="cl-sg-t">${esc(x.t)}</span><span class="cl-sg-d">${esc(x.d)}</span>` +
            `<span class="cl-sg-arrow" aria-hidden="true">&#8599;</span></a></li>`).join('');
        list.hidden = false;
    }
    input.addEventListener('input', render);
    input.addEventListener('focus', render);
    function setQuickMenu(open) {
        if (!linkMenu || !menuToggle) return;
        linkMenu.classList.toggle('open', open);
        menuToggle.setAttribute('aria-expanded', String(open));
    }
    if (menuToggle) {
        menuToggle.addEventListener('click', () => {
            setQuickMenu(!linkMenu.classList.contains('open'));
        });
    }
    if (linkMenu) {
        linkMenu.querySelectorAll('.cl-pill').forEach(link => {
            link.addEventListener('click', () => setQuickMenu(false));
        });
    }
    form.addEventListener('submit', (e) => {
        e.preventDefault();
        const top = list.querySelector('.cl-sg');
        if (top) window.location.href = top.getAttribute('href');
    });
    document.addEventListener('click', (e) => {
        if (!form.contains(e.target)) list.hidden = true;
        if (linkMenu && !linkMenu.contains(e.target)) setQuickMenu(false);
    });
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            list.hidden = true;
            setQuickMenu(false);
        }
    });
}
document.addEventListener('DOMContentLoaded', () => {
    initHomeSearch();
});
</script>
