<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大軍的個人網站</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0a0a0a;
  --text:#eaeaea;
  --muted:#555;
  --border:#1a1a1a;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',sans-serif;
  line-height:1.8;
}

/* HEADER */
header{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  border-bottom:1px solid var(--border);
}

.title{
  font-family:'Playfair Display',serif;
  font-size:clamp(3rem,8vw,5rem);
  font-weight:400;
}

.subtitle{
  margin-top:1rem;
  font-size:0.8rem;
  color:var(--muted);
  letter-spacing:0.2em;
}

/* NAV */
nav{
  display:flex;
  justify-content:center;
  border-bottom:1px solid var(--border);
}

nav a{
  padding:1rem 1.5rem;
  text-decoration:none;
  color:var(--muted);
  font-size:0.7rem;
  letter-spacing:0.2em;
  text-transform:uppercase;
}

nav a.active, nav a:hover{
  color:var(--text);
}

/* PAGE */
.page{display:none;}
.page.active{display:block;}

.wrapper{
  max-width:700px;
  margin:auto;
  padding:4rem 2rem;
}

/* HOME */
.home-text{
  font-size:1.2rem;
  margin-bottom:2rem;
}

.home-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:1px;
  background:var(--border);
}

.home-card{
  background:var(--bg);
  padding:2rem;
  text-decoration:none;
  color:var(--text);
  transition:0.3s;
}

.home-card:hover{
  background:#111;
}

/* POSTS */
.post{
  margin-bottom:3rem;
  border-bottom:1px solid var(--border);
  padding-bottom:2rem;
}

.post-date{
  font-size:0.7rem;
  color:var(--muted);
}

.post-title{
  font-family:'Playfair Display',serif;
  font-size:1.5rem;
  margin:0.5rem 0;
}

.post-body{
  font-size:0.9rem;
  color:#aaa;
}

/* FOOTER */
footer{
  text-align:center;
  padding:2rem;
  border-top:1px solid var(--border);
  font-size:0.7rem;
  color:var(--muted);
}

</style>
</head>

<body>

<header>
  <div>
    <div class="title">大軍</div>
    <div class="subtitle">a personal space</div>
  </div>
</header>

<nav>
  <a href="#" class="active" onclick="showPage('home',this)">Home</a>
  <a href="#" onclick="showPage('daily',this)">Daily</a>
  <a href="#" onclick="showPage('travel',this)">Travel</a>
  <a href="#" onclick="showPage('portfolio',this)">Portfolio</a>
  <a href="#" onclick="showPage('resume',this)">Resume</a>
</nav>

<!-- HOME -->
<div id="page-home" class="page active">
  <div class="wrapper">
    <p class="home-text">
      這裡記錄一些生活、一些想法，還有正在發生的事。
    </p>

    <div class="home-grid">
      <a class="home-card" href="#" onclick="showPage('daily',document.querySelectorAll('nav a')[1])">Daily</a>
      <a class="home-card" href="#" onclick="showPage('travel',document.querySelectorAll('nav a')[2])">Travel</a>
      <a class="home-card" href="#" onclick="showPage('portfolio',document.querySelectorAll('nav a')[3])">Portfolio</a>
      <a class="home-card" href="#" onclick="showPage('resume',document.querySelectorAll('nav a')[4])">Resume</a>
    </div>
  </div>
</div>

<!-- DAILY -->
<div id="page-daily" class="page">
  <div class="wrapper">

    <div class="post">
      <div class="post-date">Apr 28, 2026</div>
      <div class="post-title">今天的日常</div>
      <div class="post-body">
        今天過得很普通，但還是記一下。
      </div>
    </div>

  </div>
</div>

<!-- TRAVEL -->
<div id="page-travel" class="page">
  <div class="wrapper">
    <div class="post">
      <div class="post-date">2026</div>
      <div class="post-title">旅行紀錄</div>
      <div class="post-body">
        之後有去的地方會放在這裡。
      </div>
    </div>
  </div>
</div>

<!-- PORTFOLIO -->
<div id="page-portfolio" class="page">
  <div class="wrapper">
    Coming soon
  </div>
</div>

<!-- RESUME -->
<div id="page-resume" class="page">
  <div class="wrapper">
    Coming soon
  </div>
</div>

<footer>
  © 2026 Dajun
</footer>

<script>
function showPage(name, el){
  event.preventDefault();
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('nav a').forEach(a=>a.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  if(el) el.classList.add('active');
}
</script>

</body>
</html>
