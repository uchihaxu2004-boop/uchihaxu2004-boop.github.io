<style>
:root {
    --color-bg: #0a0a0a;
    --color-bg-alt: #111111;
    --color-white: #ffffff;
    --color-silver: #c0c0c0;
    --color-silver-dim: #8a8a8a;
    --color-accent: #e8e8e8;
    --font-display: 'Playfair Display', serif;
    --font-body: 'Inter', sans-serif;
    --font-cn: 'Noto Serif TC', serif;
    --transition-smooth: cubic-bezier(0.25, 0.46, 0.45, 0.94);
    --transition-bounce: cubic-bezier(0.68, -0.55, 0.265, 1.55);
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; font-size: 16px; }
body {
    font-family: var(--font-display);
    background: var(--color-bg);
    color: var(--color-white);
    overflow-x: hidden;
    min-height: 100vh;
}

/* All Latin / numeric UI labels use Playfair Display — including spots that
   previously used SF Mono or Inter (per design feedback: "all numbers + English
   should use the title font"). Chinese still uses Noto Serif TC. */
.active-filter-count,
.footer-year,
.btn-submit,
.upload-hint code {
    font-family: var(--font-display) !important;
}

/* Noise Overlay */
.noise-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 9000; opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
}





























/* ── LOG PAGE ── */
.log-page {
    padding: 3rem 3rem 4rem;
    max-width: 1400px;
    margin: 0 auto;
    position: relative;
}

/* Top filter bar: title | pills | calendar btn */
.filter-bar {
    display: grid;
    grid-template-columns: auto 1fr;
    align-items: center;
    gap: 0.5rem 1.5rem;
    margin-bottom: 3rem;
    position: relative;
}

.log-title-block {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
    flex-shrink: 0;
}
.log-title-num {
    font-family: var(--font-display);
    font-size: 0.75rem;
    letter-spacing: 0.3em;
    color: var(--color-silver-dim);
    text-transform: uppercase;
}
.log-title {
    font-family: var(--font-display);
    font-size: clamp(3rem, 6vw, 4.75rem);
    font-weight: 400;
    color: var(--color-white);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    line-height: 1;
}

/* Pills scroller */
.pills-wrap {
    position: relative;
    min-width: 0;
    display: flex;
    align-items: center;
    gap: 0.25rem;
    border-left: 1px solid rgba(255,255,255,0.15);
    border-right: 1px solid rgba(255,255,255,0.15);
    padding-left: 1.25rem;
    padding-right: 1.25rem;
}
.pills-nav {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--color-silver);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.25s, color 0.25s, opacity 0.25s, transform 0.2s;
}
.pills-nav:hover:not(:disabled) { background: rgba(255,255,255,0.12); color: var(--color-white); }
.pills-nav:active:not(:disabled) { transform: scale(0.92); }
.pills-nav:disabled { opacity: 0; pointer-events: none; width: 0; padding: 0; border: none; margin: 0; transition: width 0.3s, opacity 0.2s; }
.pills-nav svg { width: 14px; height: 14px; }

.pills-track-wrap {
    position: relative;
    flex: 1;
    min-width: 0;
    overflow: hidden;
}
.pills-track {
    display: flex;
    gap: 0.5rem;
    overflow-x: auto;
    overflow-y: hidden;
    scrollbar-width: none;
    scroll-behavior: smooth;
    padding: 0.25rem 0;
    -webkit-overflow-scrolling: touch;
}
.pills-track::-webkit-scrollbar { display: none; }

.pill {
    flex: 0 0 auto;
    padding: 0.55rem 1.15rem;
    background: transparent;
    border: none;
    border-radius: 999px;
    color: var(--color-silver);
    font-family: var(--font-display);
    font-size: 0.78rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    white-space: nowrap;
    transition: color 0.25s, background 0.25s;
    user-select: none;
}
.pill:hover { color: var(--color-white); background: rgba(255,255,255,0.06); }
.pill.active {
    background: transparent;
    color: var(--color-white);
    box-shadow: none;
}
.pill.active:hover { color: var(--color-white); background: rgba(255,255,255,0.06); }
.pill .pill-sep {
    display: inline-block;
    margin: 0 0.3em;
    opacity: 0.5;
}
.pill.active .pill-sep { opacity: 0.6; }

/* Edge fades on pills track */
.pills-track-wrap::before,
.pills-track-wrap::after {
    content: '';
    position: absolute;
    top: 0; bottom: 0;
    width: 32px;
    pointer-events: none;
    z-index: 2;
    opacity: 0;
    transition: opacity 0.3s;
}
.pills-track-wrap::before { left: 0; background: linear-gradient(90deg, var(--color-bg) 0%, rgba(10,10,10,0) 100%); }
.pills-track-wrap::after { right: 0; background: linear-gradient(-90deg, var(--color-bg) 0%, rgba(10,10,10,0) 100%); }
.pills-track-wrap.fade-left::before { opacity: 1; }
.pills-track-wrap.fade-right::after { opacity: 1; }

/* ── ACTIVE FILTER LABEL ── */
.active-filter {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1.5rem;
    font-family: var(--font-display);
    color: var(--color-silver-dim);
    font-size: 0.78rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    min-height: 1rem;
}
/* 城市快速篩選：放在 frame 計數後面的空白處、靠右；按鈕沿用上方國家 .pill 的樣式與效果 */
.city-chips {
    margin-left: auto;
    display: flex;
    flex-wrap: wrap;
    justify-content: flex-end;
    align-items: center;
    gap: 0.1rem;
}
.city-chips:empty { display: none; }
.city-chips .pill { padding: 0.4rem 1rem; }   /* 稍微縮短上下，免得這行太高 */

/* 城市下拉選單：桌機隱藏、手機顯示，取代擁擠的城市 pill 排 */
.city-dropdown { display: none; position: relative; margin-left: auto; }
.city-dropdown:empty { display: none; }
.city-dd-toggle {
    display: inline-flex; align-items: center; gap: 0.5rem;
    padding: 0.4rem 0.9rem;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 999px;
    color: var(--color-silver);
    font-family: var(--font-display);
    font-size: 0.72rem; letter-spacing: 0.18em; text-transform: uppercase;
    cursor: pointer; white-space: nowrap;
    transition: border-color 0.25s, color 0.25s, background 0.25s;
}
.city-dd-toggle:hover { color: var(--color-white); border-color: rgba(255,255,255,0.3); }
.city-dd-toggle svg { width: 12px; height: 12px; flex: none; transition: transform 0.25s var(--transition-smooth); }
.city-dropdown.open .city-dd-toggle svg { transform: rotate(180deg); }
.city-dd-menu {
    display: none;
    position: absolute; right: 0; top: calc(100% + 0.5rem);
    min-width: 170px; max-height: 60vh; overflow-y: auto;
    background: #141414; border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px; padding: 0.35rem; z-index: 40;
    box-shadow: 0 24px 60px rgba(0,0,0,0.6);
}
.city-dropdown.open .city-dd-menu { display: block; }
.city-dd-item {
    display: block; width: 100%; text-align: left;
    padding: 0.6rem 0.85rem; background: transparent; border: none;
    border-radius: 8px; color: var(--color-silver);
    font-family: var(--font-display); font-size: 0.72rem;
    letter-spacing: 0.12em; text-transform: uppercase;
    cursor: pointer; white-space: nowrap;
    transition: background 0.2s, color 0.2s;
}
.city-dd-item:hover { background: rgba(255,255,255,0.06); color: var(--color-white); }
.city-dd-item.active { color: var(--color-white); background: rgba(255,255,255,0.05); }
.active-filter-label { opacity: 0.6; }
.active-filter-value {
    color: var(--color-white);
    font-family: var(--font-display);
    font-size: 0.78rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    font-style: normal;
}
.active-filter-count {
    color: var(--color-silver-dim);
    font-family: 'SF Mono', 'Menlo', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
}

/* ── GALLERY (masonry 2-column) ── */
.gallery {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.5rem;
    position: relative;
    align-items: start;
}
.gallery-col {
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
}

.photo-item {
    position: relative;
    width: 100%;
    overflow: hidden;
    border-radius: 6px;
    background: var(--color-bg-alt);
    border: 1px solid rgba(255,255,255,0.05);
    box-shadow: 0 6px 22px rgba(0,0,0,0.45);
    cursor: pointer;
}
.photo-item.is-hidden { display: none; }

.photo-aspect {
    position: relative;
    width: 100%;
    overflow: hidden;
}
.photo-aspect img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transform: scale(1.04);
    transition: opacity 1s var(--transition-smooth), transform 8s var(--transition-smooth);
    display: block;
}
.photo-item.loaded .photo-aspect img.in-view {
    opacity: 1;
    transform: scale(1);
}
.photo-item:hover .photo-aspect img.in-view { transform: scale(1.06); transition: transform 1.6s var(--transition-smooth); }

.photo-meta {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    padding: 0.9rem 1rem 0.85rem;
    background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.85) 100%);
    color: var(--color-white);
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 0.75rem;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.35s var(--transition-smooth), transform 0.35s var(--transition-smooth);
    pointer-events: none;
}
.photo-item:hover .photo-meta { opacity: 1; transform: translateY(0); }
.photo-date {
    font-family: var(--font-display);
    font-size: 0.78rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
}
.photo-day {
    font-family: 'SF Mono', 'Menlo', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--color-silver);
    text-transform: uppercase;
}

/* Film perforation accent on each photo (subtle, top-left) */
.photo-num {
    position: absolute;
    top: 10px; left: 12px;
    font-family: 'SF Mono', 'Menlo', monospace;
    font-size: 0.55rem;
    letter-spacing: 0.25em;
    color: rgba(255,255,255,0.55);
    text-transform: uppercase;
    background: rgba(0,0,0,0.35);
    padding: 0.2rem 0.5rem;
    border-radius: 3px;
    backdrop-filter: blur(4px);
    z-index: 2;
}

/* Empty state */
.gallery-empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 5rem 2rem;
    color: var(--color-silver-dim);
    font-family: var(--font-display);
    font-style: italic;
    font-size: 1.05rem;
    letter-spacing: 0.05em;
    display: none;
}
.gallery-empty.show { display: block; }


.footer-min {
    position: relative;
    height: 6rem;
}
.footer-min .footer-line {
    position: absolute;
    bottom: 0; left: 0;
    width: 100%; height: 2px;
    background: linear-gradient(90deg, transparent, var(--color-silver-dim), transparent);
    opacity: 0.3;
}

@media (max-width: 768px) {
    /* 手機：城市改用下拉選單，避免 pill 排太擠 */
    .city-chips { display: none !important; }
    .city-dropdown:not(:empty) { display: block; }
}

/* ── FOOTER (legacy, kept for reference but unused) ── */
.footer { padding: 4rem 3rem; background: var(--color-bg); border-top: 1px solid rgba(255, 255, 255, 0.05); position: relative; margin-top: 4rem; }
.footer-content { max-width: 1400px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; gap: 2rem; }
.social-row { display: flex; list-style: none; gap: 2.25rem; padding: 0; margin: 0; align-items: center; }
.social-link { display: inline-flex; align-items: center; justify-content: center; width: 44px; height: 44px; color: var(--color-silver); text-decoration: none; border-radius: 50%; transition: color 0.3s var(--transition-smooth), transform 0.3s var(--transition-smooth), background 0.3s; }
.social-link svg { width: 22px; height: 22px; display: block; }
.social-link:hover { color: var(--color-bg); background: var(--color-white); transform: translateY(-3px); }
.footer-year { font-size: 0.7rem; color: var(--color-silver-dim); text-transform: uppercase; letter-spacing: 0.3em; }
.footer-line { position: absolute; bottom: 0; left: 0; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, var(--color-silver-dim), transparent); opacity: 0.3; }

/* ── RESPONSIVE ── */
@media (max-width: 1024px) {
    .log-page { padding: 2.5rem 1.75rem 3rem; }
    .filter-bar { gap: 1.25rem; }
    .gallery { grid-template-columns: repeat(2, 1fr); gap: 1rem; }
    .gallery-col { gap: 1rem; }
}
@media (max-width: 768px) {
    
    
    
    .log-page { padding: 2rem 1.25rem 2rem; }
    .filter-bar {
        grid-template-columns: 1fr;
        grid-template-areas:
            "title"
            "pills";
        gap: 1rem 0.75rem;
        margin-bottom: 2rem;
    }
    .log-title-block { grid-area: title; }
    .pills-wrap { grid-area: pills; }
    .log-title { font-size: 2.75rem; }
    .pills-nav { display: none; }
    .gallery { grid-template-columns: 1fr; gap: 1rem; }
    .gallery-col { gap: 1rem; }
}
</style>
</head>

<script>
/* ====================================================================
   Adventures data: countries + regions + sample photos.
   Each photo has: country, region, src, isPortrait.
   ==================================================================== */
const COUNTRIES = [
    {
        code: 'TW', name: 'Taiwan', nameCn: '台灣', glyph: '台',
        regions: ['Taipei','New Taipei','Taichung','Tainan','Kaohsiung','Hualien','Yilan','Taitung','Kenting']
    },
    {
        code: 'HK', name: 'Hong Kong', nameCn: '香港', glyph: '港',
        regions: ['Central','Tsim Sha Tsui','Causeway Bay','Lantau Island','Sai Kung']
    },
    {
        code: 'JP', name: 'Japan', nameCn: '日本', glyph: '日',
        regions: ['Tokyo','Kyoto','Osaka','Kobe','Mount Fuji','Hokkaido','Okinawa','Nara','Hakone']
    },
    {
        code: 'US', name: 'USA', nameCn: '美國', glyph: '美',
        regions: ['New York','Los Angeles','Orange County','San Diego','San Francisco','Seattle','Las Vegas','Mojave','Houston','Chicago','Boston']
    },
    {
        code: 'ID', name: 'Indonesia', nameCn: '印尼', glyph: '印',
        regions: ['Bali','Jakarta','Lombok','Yogyakarta','Bandung']
    },
];

const COUNTRY_BY_CODE = Object.fromEntries(COUNTRIES.map(c => [c.code, c]));

// ── 新增照片：在陣列裡加一行即可 ──────────────────────────────
// photo('國家全名-地區全名-號碼', ar?, 'YYYY-MM-DD'?)
//   檔名格式：國家-地區-號碼，多字名稱去掉空格
//   國家：Taiwan / HongKong / Japan / USA / Indonesia
//   地區範例：Taipei、NewYork、TsimShaTsui、SanFrancisco
//   ar  = 真實長寬比（高/寬），可省略：有填版面一開始就準、不跳動；省略則載入後自動偵測
//   日期 = 'YYYY-MM-DD'，可省略；方向（直式/橫式）一律由程式判定
function photo(filename, ar, dateStr) {
    const parts = filename.split('-');
    const countryRaw = parts[0];
    const regionRaw  = parts[1];
    // 比對國家（忽略空格大小寫）
    const countryData = COUNTRIES.find(c =>
        c.name.replace(/\s/g, '').toLowerCase() === countryRaw.toLowerCase()
    );
    const countryCode = countryData?.code || countryRaw;
    // 比對地區（忽略空格大小寫）
    const region = (countryData?.regions || []).find(r =>
        r.replace(/\s/g, '').toLowerCase() === regionRaw.toLowerCase()
    ) || regionRaw;
    let date = null;
    if (dateStr) { const [y, m, d] = dateStr.split('-').map(Number); date = new Date(y, m - 1, d || 1); }
    return {
        id: filename,
        country: countryCode,
        region,
        date,
        ar: ar || null,
        src: `images/adventures/${filename}.jpg`,
    };
}

const PHOTOS = [
    // ── 日本 2025/9 ──
    photo('Japan-Tokyo-1', 0.75,   '2025-09-03'),
    photo('Japan-Tokyo-2', 1.3333, '2025-09-05'),
    photo('Japan-Tokyo-3', 1.3333, '2025-09-05'),
    photo('Japan-Tokyo-4', 1.3333, '2025-09-05'),
    photo('Japan-MountFuji-1', 1.3333, '2025-09-06'),
    photo('Japan-MountFuji-2', 1.3333, '2025-09-06'),
    photo('Japan-Tokyo-5', 1.3333, '2025-09-07'),
    photo('Japan-Osaka-1', 1.3333, '2025-09-09'),
    photo('Japan-Osaka-2', 1.3333, '2025-09-09'),
    photo('Japan-Kobe-1', 1.3333, '2025-09-10'),
    photo('Japan-Kyoto-1', 1.7779, '2025-09-10'),
    photo('Japan-Kyoto-2', 1.3333, '2025-09-10'),
    photo('Japan-Kyoto-3', 1.3333, '2025-09-10'),
    photo('Japan-Osaka-3', 0.75,   '2025-09-11'),
    photo('Japan-Osaka-4', 1.3333, '2025-09-11'),
    photo('Japan-Osaka-5', 1.3333, '2025-09-11'),
    // ── 美國 2026/2 ──
    photo('USA-SanDiego-1', 1.3333, '2026-02-01'),
    photo('USA-LosAngeles-1', 1.3333, '2026-02-02'),
    photo('USA-LosAngeles-2', 1.3333, '2026-02-02'),
    photo('USA-OrangeCounty-1', 1.3335, '2026-02-04'),
    photo('USA-LosAngeles-3', 1.7778, '2026-02-05'),
    photo('USA-Mojave-1', 1.3333, '2026-02-06'),
    photo('USA-LasVegas-1', 1.3333, '2026-02-07'),
    photo('USA-Houston-1', 1.3333, '2026-02-10'),
    photo('USA-OrangeCounty-2', 1.3333, '2026-02-12'),
    photo('USA-LosAngeles-4', 1.3333, '2026-02-13'),
];

const state = {
    filterMode: 'all',     // 'all' | 'country' | 'region'
    filterKey: null,       // country code, or 'CODE::Region'
};

const pad2 = (n) => String(n).padStart(2, '0');
const MONTH_LABELS_EN = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];

function regionKey(code, region) { return `${code}::${region}`; }
function photoCountByRegion(code, region) { return PHOTOS.filter(p => p.country === code && p.region === region).length; }

/* ── Pills (country) ── */
function buildPills() {
    const track = document.getElementById('pillsTrack');
    track.innerHTML = '';

    const allPill = document.createElement('button');
    allPill.className = 'pill active';
    allPill.dataset.filter = 'all';
    allPill.textContent = 'All';
    track.appendChild(allPill);

    COUNTRIES.forEach(c => {
        const pill = document.createElement('button');
        pill.className = 'pill';
        pill.dataset.filter = 'country';
        pill.dataset.key = c.code;
        pill.textContent = c.name;
        track.appendChild(pill);
    });

    track.addEventListener('click', (e) => {
        const pill = e.target.closest('.pill');
        if (!pill) return;
        if (pill.dataset.filter === 'all') setFilter('all', null);
        else setFilter('country', pill.dataset.key);
    });
}

function updatePillsActive() {
    document.querySelectorAll('#pillsTrack .pill').forEach(p => {
        let active = false;
        if (state.filterMode === 'all' && p.dataset.filter === 'all') active = true;
        else if (state.filterMode === 'country' && p.dataset.filter === 'country' && p.dataset.key === state.filterKey) active = true;
        else if (state.filterMode === 'region' && p.dataset.filter === 'country' && state.filterKey && state.filterKey.startsWith(p.dataset.key + '::')) active = true;
        p.classList.toggle('active', active);
    });
}

function initPillsNav() {
    const track = document.getElementById('pillsTrack');
    const wrap  = document.getElementById('pillsTrackWrap');
    const prev  = document.getElementById('pillsPrev');
    const next  = document.getElementById('pillsNext');

    const updateFades = () => {
        const { scrollLeft, scrollWidth, clientWidth } = track;
        wrap.classList.toggle('fade-left', scrollLeft > 4);
        wrap.classList.toggle('fade-right', scrollLeft + clientWidth < scrollWidth - 4);
        prev.disabled = scrollLeft <= 4;
        next.disabled = scrollLeft + clientWidth >= scrollWidth - 4;
    };

    prev.addEventListener('click', () => track.scrollBy({ left: -260, behavior: 'smooth' }));
    next.addEventListener('click', () => track.scrollBy({ left:  260, behavior: 'smooth' }));
    track.addEventListener('scroll', updateFades, { passive: true });
    window.addEventListener('resize', updateFades);
    requestAnimationFrame(updateFades);
}

/* ── Gallery + filtering ── */
const GALLERY_COLS = 3;
let galleryColEls = [];   // 三個欄位容器
let galleryItems = [];    // 全部 item 元素（含 _ar 供高度預估），建立一次後重複使用

function buildGallery() {
    const gallery = document.getElementById('gallery');
    gallery.innerHTML = '';

    galleryColEls = [];
    for (let i = 0; i < GALLERY_COLS; i++) {
        const c = document.createElement('div');
        c.className = 'gallery-col';
        gallery.appendChild(c);
        galleryColEls.push(c);
    }

    galleryItems = PHOTOS.map((p, i) => {
        const item = document.createElement('div');
        item.className = 'photo-item';
        item.dataset.id = p.id;
        item.dataset.country = p.country;
        item.dataset.regionKey = regionKey(p.country, p.region);
        item._ar = p.ar || 1.25;   // 高度預估用

        // 有真實比例就直接套用（不跳動、不裁切）；省略時用佔位比例，載入後再由 naturalWidth/Height 修正
        const aspect = p.ar ? `1 / ${p.ar}` : '3 / 4';
        const country = COUNTRY_BY_CODE[p.country];
        const place = `${country ? country.name : p.country} · ${p.region}`;

        // 純照片，無編號、無 hover 文字；alt 保留地點供無障礙
        item.innerHTML = `
            <div class="photo-aspect" style="aspect-ratio: ${aspect}">
                <img alt="${place}" data-src="${p.src}" loading="lazy">
            </div>
        `;
        return item;
    });

    relayoutGallery();
}

/* 依目前篩選，只取符合的照片重新做 masonry：
   逐張放入「當下最矮」的欄、平手取最左 → 每個檢視（全部／各國／各地區）都由左先填、緊密貼合不留縫。 */
function relayoutGallery() {
    const colH = new Array(GALLERY_COLS).fill(0);
    galleryColEls.forEach(c => c.replaceChildren());

    galleryItems.forEach(item => {
        if (!matchesFilter(item)) return;
        let c = 0;
        for (let k = 1; k < GALLERY_COLS; k++) if (colH[k] < colH[c]) c = k;
        galleryColEls[c].appendChild(item);
        colH[c] += item._ar + 0.12;
    });

    document.getElementById('gallery').appendChild(document.getElementById('galleryEmpty'));
}

function initImageObserver() {
    const items = document.querySelectorAll('.photo-item');
    const io = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (!entry.isIntersecting) return;
            const item = entry.target;
            const img = item.querySelector('img');
            if (item.dataset.loaded === '1') { img.classList.add('in-view'); return; }
            const src = img.dataset.src;
            img.onerror = () => { img.onerror = null; img.src = 'https://placehold.co/600x900/151515/3a3a3a/png?text=%E2%97%87'; };
            img.onload = () => {
                // 省略 ar 時的後備：依真實長寬套用等比例容器
                const w = img.naturalWidth, h = img.naturalHeight;
                if (w && h) { const a = img.closest('.photo-aspect'); if (a) a.style.aspectRatio = `${w} / ${h}`; }
                item.classList.add('loaded'); img.classList.add('in-view');
            };
            img.src = src;
            item.dataset.loaded = '1';
            io.unobserve(item);
        });
    }, { rootMargin: '200px 0px', threshold: 0.05 });

    items.forEach(it => io.observe(it));
}

function matchesFilter(item) {
    if (state.filterMode === 'all') return true;
    if (state.filterMode === 'country') return item.dataset.country === state.filterKey;
    if (state.filterMode === 'region')  return item.dataset.regionKey === state.filterKey;
    return true;
}

function setFilter(mode, key) {
    state.filterMode = mode;
    state.filterKey  = key;
    updatePillsActive();
    renderCityChips();
    updateActiveFilterLabel();
    applyFilterWithFlip();
}

/* 目前的國家代碼（all → null） */
function currentCountryCode() {
    if (state.filterMode === 'country') return state.filterKey;
    if (state.filterMode === 'region' && state.filterKey) return state.filterKey.split('::')[0];
    return null;
}

/* 某國有照片的城市（依資料出現順序去重） */
function citiesOfCountry(code) {
    const seen = new Set(); const list = [];
    PHOTOS.forEach(p => {
        if (p.country !== code || seen.has(p.region)) return;
        seen.add(p.region); list.push(p.region);
    });
    return list;
}

/* 城市快速篩選：只在選了國家時顯示，且只放「該國」的城市；樣式沿用 .pill。
   All 不顯示；再按已選城市 → 回到該國全部。 */
function renderCityChips() {
    const wrap = document.getElementById('cityChips');
    const dd = document.getElementById('cityDropdown');
    if (wrap) wrap.innerHTML = '';
    if (dd) dd.innerHTML = '';
    const code = currentCountryCode();
    if (!code) return;   // All → 不放（pill 排與下拉皆空）

    const cities = citiesOfCountry(code);
    const activeRegion = (state.filterMode === 'region' && state.filterKey)
        ? state.filterKey.split('::')[1] : null;

    // ── 桌機：城市 pill 排 ──
    if (wrap) {
        cities.forEach(region => {
            const key = regionKey(code, region);
            const btn = document.createElement('button');
            btn.className = 'pill';
            btn.dataset.key = key;
            btn.setAttribute('role', 'tab');
            btn.textContent = region;
            if (state.filterMode === 'region' && state.filterKey === key) btn.classList.add('active');
            btn.addEventListener('click', () => {
                if (state.filterMode === 'region' && state.filterKey === key) setFilter('country', code); // 取消城市、留在該國
                else setFilter('region', key);
            });
            wrap.appendChild(btn);
        });
    }

    // ── 手機：城市下拉選單 ──
    if (dd) {
        const toggle = document.createElement('button');
        toggle.type = 'button';
        toggle.className = 'city-dd-toggle';
        toggle.setAttribute('aria-haspopup', 'listbox');
        toggle.setAttribute('aria-expanded', 'false');
        toggle.innerHTML = `<span class="city-dd-label">${activeRegion || 'Select City'}</span>`
            + '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>';

        const menu = document.createElement('div');
        menu.className = 'city-dd-menu';
        menu.setAttribute('role', 'listbox');

        const mkItem = (text, onClick, selected) => {
            const it = document.createElement('button');
            it.type = 'button';
            it.className = 'city-dd-item' + (selected ? ' active' : '');
            it.setAttribute('role', 'option');
            it.setAttribute('aria-selected', selected ? 'true' : 'false');
            it.textContent = text;
            it.addEventListener('click', onClick);
            return it;
        };
        // 「All cities」＝取消城市、留在該國
        menu.appendChild(mkItem('All cities', () => setFilter('country', code), !activeRegion));
        cities.forEach(region => {
            const key = regionKey(code, region);
            const selected = state.filterMode === 'region' && state.filterKey === key;
            menu.appendChild(mkItem(region, () => setFilter('region', key), selected));
        });

        toggle.addEventListener('click', (e) => {
            e.stopPropagation();
            const open = dd.classList.toggle('open');
            toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
        });

        dd.appendChild(toggle);
        dd.appendChild(menu);
    }
}

/* 點擊選單外部時關閉城市下拉（只註冊一次） */
document.addEventListener('click', (e) => {
    const dd = document.getElementById('cityDropdown');
    if (dd && dd.classList.contains('open') && !dd.contains(e.target)) {
        dd.classList.remove('open');
        const t = dd.querySelector('.city-dd-toggle');
        if (t) t.setAttribute('aria-expanded', 'false');
    }
});

function updateActiveFilterLabel() {
    const valEl = document.getElementById('activeFilterValue');
    const cntEl = document.getElementById('activeFilterCount');

    let visibleCount = 0;
    galleryItems.forEach(it => {
        if (matchesFilter(it)) visibleCount++;
    });

    let label = 'All';
    if (state.filterMode === 'country' && state.filterKey) {
        label = COUNTRY_BY_CODE[state.filterKey].name;
    } else if (state.filterMode === 'region' && state.filterKey) {
        const [code, region] = state.filterKey.split('::');
        label = `${COUNTRY_BY_CODE[code].name} · ${region}`;
    }
    valEl.textContent = label;
    cntEl.textContent = `${pad2(visibleCount)} ${visibleCount === 1 ? 'frame' : 'frames'}`;

    document.getElementById('galleryEmpty').classList.toggle('show', visibleCount === 0);
    if (typeof updateStepButtons === 'function') updateStepButtons();
}

function applyFilterWithFlip() {
    // 只取符合篩選的照片重新做 masonry（由左先填、緊密貼合），取代舊的就地隱藏
    relayoutGallery();
}

/* ── Country step buttons ──
   left button (stepNext) = previous destination (index − 1)
   right button (stepPrev) = next destination (index + 1)
*/
function getCurrentCountryIndex() {
    if (state.filterMode === 'country') return COUNTRIES.findIndex(c => c.code === state.filterKey);
    if (state.filterMode === 'region' && state.filterKey) {
        const code = state.filterKey.split('::')[0];
        return COUNTRIES.findIndex(c => c.code === code);
    }
    return -1;
}

function updateStepButtons() {
    const idx = getCurrentCountryIndex();
    const nextBtn = document.getElementById('stepNext');
    const prevBtn = document.getElementById('stepPrev');
    const nextLab = document.getElementById('stepNextTarget');
    const prevLab = document.getElementById('stepPrevTarget');
    if (!nextBtn || !prevBtn || !nextLab || !prevLab) return;

    let prevIdx, nextIdx;
    if (idx < 0) { prevIdx = -1; nextIdx = 0; }
    else { prevIdx = idx - 1; nextIdx = idx + 1; }

    const leftDisabled  = prevIdx < 0;
    const rightDisabled = nextIdx >= COUNTRIES.length;

    nextBtn.disabled = leftDisabled;
    prevBtn.disabled = rightDisabled;

    nextLab.textContent = leftDisabled  ? '— · —' : COUNTRIES[prevIdx].name;
    prevLab.textContent = rightDisabled ? '— · —' : COUNTRIES[nextIdx].name;
}

function initStepButtons() {
    const nextBtn = document.getElementById('stepNext');
    const prevBtn = document.getElementById('stepPrev');
    if (!nextBtn || !prevBtn) return;
    nextBtn.addEventListener('click', () => {
        const idx = getCurrentCountryIndex();
        const target = idx < 0 ? -1 : idx - 1;
        if (target < 0) return;
        setFilter('country', COUNTRIES[target].code);
        window.scrollTo({ top: 0, behavior: 'smooth' });
    });
    prevBtn.addEventListener('click', () => {
        const idx = getCurrentCountryIndex();
        const target = idx < 0 ? 0 : idx + 1;
        if (target >= COUNTRIES.length) return;
        setFilter('country', COUNTRIES[target].code);
        window.scrollTo({ top: 0, behavior: 'smooth' });
    });
    updateStepButtons();
}

function initNav() {
    const hamburger = document.getElementById('hamburger');
    const mobileMenu = document.getElementById('mobileMenu');
    if (hamburger) {
        hamburger.addEventListener('click', () => {
            hamburger.classList.toggle('active');
            mobileMenu.classList.toggle('active');
        });
    }
    document.querySelectorAll('.mobile-link').forEach(link => link.addEventListener('click', () => {
        hamburger.classList.remove('active');
        mobileMenu.classList.remove('active');
    }));

    const cta = document.querySelector('.nav-cta');
    if (cta) {
        const gloss = document.createElement('div');
        gloss.style.cssText = 'position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity .2s;z-index:2;';
        cta.appendChild(gloss);
        cta.addEventListener('mousemove', e => {
            const rect = cta.getBoundingClientRect();
            const x = ((e.clientX - rect.left) / rect.width) * 100;
            const y = ((e.clientY - rect.top) / rect.height) * 100;
            gloss.style.background = `radial-gradient(circle at ${x}% ${y}%, rgba(255,255,255,0.38) 0%, rgba(220,215,200,0.15) 40%, transparent 70%)`;
            gloss.style.opacity = '1';
        });
        cta.addEventListener('mouseleave', () => { gloss.style.opacity = '0'; });
    }
}

document.addEventListener('DOMContentLoaded', () => {
    initNav();
    buildPills();
    initPillsNav();
    buildGallery();
    initImageObserver();
    initStepButtons();
    renderCityChips();
    updateActiveFilterLabel();
});
</script>
