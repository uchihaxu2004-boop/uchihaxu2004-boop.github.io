<style>
:root {
    --color-bg: #0a0a0a;
    --color-bg-alt: #111111;
    --color-white: #ffffff;
    --color-silver: #c0c0c0;
    --color-silver-dim: #8a8a8a;
    --color-accent: #e8e8e8;
    --font-display: 'Playfair Display', serif;
    --font-body: 'Inter', sans-serif;
    --font-cn: 'Noto Serif TC', serif;
    --transition-smooth: cubic-bezier(0.25, 0.46, 0.45, 0.94);
    --transition-bounce: cubic-bezier(0.68, -0.55, 0.265, 1.55);
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; font-size: 16px; }
body {
    font-family: var(--font-display);
    background: var(--color-bg);
    color: var(--color-white);
    overflow-x: hidden;
    min-height: 100vh;
}

/* All Latin / numeric UI labels use Playfair Display — including spots that
   previously used SF Mono or Inter (per design feedback: "all numbers + English
   should use the title font"). Chinese still uses Noto Serif TC. */
.photo-num,
.cal-weekday,
.cal-footer-hint,
.cal-clear,
.active-filter-count,
.photo-day,
.footer-year,
.btn-submit,
.upload-hint code {
    font-family: var(--font-display) !important;
}

/* Noise Overlay */
.noise-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 9000; opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
}





























/* ── LOG PAGE ── */
.log-page {
    padding: 3rem 3rem 4rem;
    max-width: 1400px;
    margin: 0 auto;
    position: relative;
}

/* Top filter bar: title | pills | calendar btn */
.filter-bar {
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 0.5rem 1.5rem;
    margin-bottom: 3rem;
    position: relative;
}

.log-title-block {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
    flex-shrink: 0;
}
.log-title-num {
    font-family: var(--font-display);
    font-size: 0.75rem;
    letter-spacing: 0.3em;
    color: var(--color-silver-dim);
    text-transform: uppercase;
}
.log-title {
    font-family: var(--font-display);
    font-size: clamp(3rem, 6vw, 4.75rem);
    font-weight: 400;
    color: var(--color-white);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    line-height: 1;
}

/* Pills scroller */
.pills-wrap {
    position: relative;
    min-width: 0;
    display: flex;
    align-items: center;
    gap: 0.25rem;
    border-left: 1px solid rgba(255,255,255,0.15);
    border-right: 1px solid rgba(255,255,255,0.15);
    padding-left: 1.25rem;
    padding-right: 1.25rem;
}
.pills-nav {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--color-silver);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.25s, color 0.25s, opacity 0.25s, transform 0.2s;
}
.pills-nav:hover:not(:disabled) { background: rgba(255,255,255,0.12); color: var(--color-white); }
.pills-nav:active:not(:disabled) { transform: scale(0.92); }
.pills-nav:disabled { opacity: 0; pointer-events: none; width: 0; padding: 0; border: none; margin: 0; transition: width 0.3s, opacity 0.2s; }
.pills-nav svg { width: 14px; height: 14px; }

.pills-track-wrap {
    position: relative;
    flex: 1;
    min-width: 0;
    overflow: hidden;
}
.pills-track {
    display: flex;
    gap: 0.5rem;
    overflow-x: auto;
    overflow-y: hidden;
    scrollbar-width: none;
    scroll-behavior: smooth;
    padding: 0.25rem 0;
    -webkit-overflow-scrolling: touch;
}
.pills-track::-webkit-scrollbar { display: none; }

.pill {
    flex: 0 0 auto;
    padding: 0.55rem 1.15rem;
    background: transparent;
    border: none;
    border-radius: 999px;
    color: var(--color-silver);
    font-family: var(--font-display);
    font-size: 0.78rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    white-space: nowrap;
    transition: color 0.25s, background 0.25s;
    user-select: none;
}
.pill:hover { color: var(--color-white); background: rgba(255,255,255,0.06); }
.pill.active {
    background: transparent;
    color: var(--color-white);
    box-shadow: none;
}
.pill.active:hover { color: var(--color-white); background: rgba(255,255,255,0.06); }
.pill .pill-sep {
    display: inline-block;
    margin: 0 0.3em;
    opacity: 0.5;
}
.pill.active .pill-sep { opacity: 0.6; }

/* Edge fades on pills track */
.pills-track-wrap::before,
.pills-track-wrap::after {
    content: '';
    position: absolute;
    top: 0; bottom: 0;
    width: 32px;
    pointer-events: none;
    z-index: 2;
    opacity: 0;
    transition: opacity 0.3s;
}
.pills-track-wrap::before { left: 0; background: linear-gradient(90deg, var(--color-bg) 0%, rgba(10,10,10,0) 100%); }
.pills-track-wrap::after { right: 0; background: linear-gradient(-90deg, var(--color-bg) 0%, rgba(10,10,10,0) 100%); }
.pills-track-wrap.fade-left::before { opacity: 1; }
.pills-track-wrap.fade-right::after { opacity: 1; }

/* Calendar button */
.cal-btn {
    width: 44px; height: 44px;
    border-radius: 12px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.18);
    color: var(--color-silver);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.25s, border-color 0.25s, color 0.25s, transform 0.2s;
    position: relative;
}
.cal-btn:hover { color: var(--color-white); border-color: rgba(255,255,255,0.45); background: rgba(255,255,255,0.08); }
.cal-btn.open {
    background: var(--color-white);
    border-color: var(--color-white);
    color: #0a0a0a;
}
.cal-btn svg { width: 20px; height: 20px; }
.cal-btn .cal-dot {
    position: absolute;
    top: 8px; right: 8px;
    width: 6px; height: 6px;
    background: #ffffff;
    border-radius: 50%;
    box-shadow: 0 0 0 2px var(--color-bg);
    opacity: 0;
    transform: scale(0.6);
    transition: opacity 0.25s, transform 0.25s;
}
.cal-btn.has-selection .cal-dot { opacity: 1; transform: scale(1); }
.cal-btn.open .cal-dot { background: #0a0a0a; box-shadow: 0 0 0 2px var(--color-white); }

/* ── CALENDAR POPOVER ── */
.cal-popover {
    position: absolute;
    top: calc(100% + 0.75rem);
    right: 0;
    width: 320px;
    background: linear-gradient(180deg, #161616 0%, #0e0e0e 100%);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    padding: 1.25rem 1.1rem 1.1rem;
    box-shadow: 0 20px 60px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.03);
    z-index: 50;
    opacity: 0;
    transform: translateY(-8px) scale(0.97);
    pointer-events: none;
    transition: opacity 0.22s var(--transition-smooth), transform 0.22s var(--transition-smooth);
}
.cal-popover.open {
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: auto;
}

.cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
    gap: 0.5rem;
}
.cal-ym {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-family: var(--font-display);
    font-size: 0.95rem;
    color: var(--color-white);
    letter-spacing: 0.08em;
}
.cal-select-wrap { position: relative; }
.cal-select {
    appearance: none;
    -webkit-appearance: none;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.12);
    color: var(--color-white);
    font-family: var(--font-display);
    font-size: 0.85rem;
    letter-spacing: 0.05em;
    padding: 0.35rem 1.6rem 0.35rem 0.65rem;
    border-radius: 6px;
    cursor: pointer;
    transition: border-color 0.25s, background 0.25s;
}
.cal-select:hover { border-color: rgba(255,255,255,0.35); background: rgba(255,255,255,0.05); }
.cal-select:focus { outline: none; border-color: var(--color-white); }
.cal-select option { background: #1a1a1a; color: var(--color-white); }
.cal-select-wrap::after {
    content: '';
    position: absolute;
    right: 8px; top: 50%;
    width: 6px; height: 6px;
    border-right: 1px solid var(--color-silver);
    border-bottom: 1px solid var(--color-silver);
    transform: translateY(-70%) rotate(45deg);
    pointer-events: none;
}

.cal-nav-btns { display: flex; gap: 0.3rem; }
.cal-nav-btn {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.15);
    color: var(--color-silver);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background 0.2s, color 0.2s, border-color 0.2s;
}
.cal-nav-btn:hover:not(:disabled) { color: var(--color-white); border-color: var(--color-white); background: rgba(255,255,255,0.08); }
.cal-nav-btn:disabled { opacity: 0.25; cursor: default; }
.cal-nav-btn svg { width: 12px; height: 12px; }

.cal-weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
    margin-bottom: 0.4rem;
}
.cal-weekday {
    text-align: center;
    font-family: 'SF Mono', 'Menlo', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    color: var(--color-silver-dim);
    text-transform: uppercase;
    padding: 0.3rem 0;
}

.cal-days {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
}
.cal-day {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-display);
    font-size: 0.85rem;
    color: var(--color-silver);
    background: transparent;
    border: 1px solid transparent;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.18s, color 0.18s, border-color 0.18s;
    user-select: none;
}
.cal-day:hover:not(.disabled):not(.empty) {
    background: rgba(255,255,255,0.06);
    color: var(--color-white);
    border-color: rgba(255,255,255,0.18);
}
.cal-day.today {
    color: var(--color-white);
    font-weight: 500;
}
.cal-day.today::after {
    content: '';
    width: 4px; height: 4px;
    background: var(--color-white);
    border-radius: 50%;
    position: absolute;
    margin-top: 22px;
}
.cal-day {
    position: relative;
}
.cal-day.has-photos {
    color: var(--color-white);
}
.cal-day.has-photos::before {
    content: '';
    position: absolute;
    bottom: 6px;
    left: 50%;
    width: 3px; height: 3px;
    background: var(--color-silver);
    border-radius: 50%;
    transform: translateX(-50%);
}
.cal-day.selected {
    background: var(--color-white);
    color: #0a0a0a;
    border-color: var(--color-white);
}
.cal-day.selected.has-photos::before { background: #0a0a0a; }
.cal-day.disabled {
    color: rgba(255,255,255,0.12);
    cursor: not-allowed;
}
.cal-day.empty { visibility: hidden; }

.cal-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 0.9rem;
    padding-top: 0.9rem;
    border-top: 1px solid rgba(255,255,255,0.06);
    gap: 0.5rem;
}
.cal-footer-hint {
    font-family: 'SF Mono', 'Menlo', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    color: var(--color-silver-dim);
    text-transform: uppercase;
}
.cal-clear {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.18);
    color: var(--color-silver);
    font-family: 'SF Mono', 'Menlo', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 0.4rem 0.85rem;
    border-radius: 6px;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s, background 0.2s;
}
.cal-clear:hover { color: var(--color-white); border-color: var(--color-white); background: rgba(255,255,255,0.05); }

/* ── COUNTRY PICKER POPOVER (adventures-specific) ── */
.country-popover {
    width: 300px;
    padding: 0.85rem 0.75rem 0.85rem;
}
.cp-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.25rem 0.5rem 0.85rem;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    margin-bottom: 0.4rem;
}
.cp-title {
    font-family: var(--font-display);
    font-size: 0.7rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--color-silver);
}
.cp-list {
    display: flex;
    flex-direction: column;
    gap: 2px;
    max-height: 380px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.15) transparent;
}
.cp-list::-webkit-scrollbar { width: 4px; }
.cp-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }

.cp-country {
    display: flex;
    flex-direction: column;
}
.cp-country-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.65rem 0.7rem;
    background: transparent;
    border: none;
    border-radius: 8px;
    color: var(--color-silver);
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
    text-align: left;
    width: 100%;
}
.cp-country-row:hover { background: rgba(255,255,255,0.05); color: var(--color-white); }
.cp-country.selected > .cp-country-row {
    background: rgba(255,255,255,0.08);
    color: var(--color-white);
}
.cp-country-flag {
    font-family: var(--font-display);
    font-size: 0.95rem;
    width: 22px;
    flex-shrink: 0;
    color: var(--color-silver-dim);
    text-align: center;
}
.cp-country.selected .cp-country-flag,
.cp-country-row:hover .cp-country-flag { color: var(--color-white); }
.cp-country-name {
    font-family: var(--font-display);
    font-size: 0.85rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    flex: 1;
}
.cp-country-count {
    font-family: var(--font-display);
    font-size: 0.62rem;
    letter-spacing: 0.2em;
    color: var(--color-silver-dim);
    text-transform: uppercase;
    margin-right: 0.25rem;
}
.cp-expand {
    width: 22px; height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--color-silver-dim);
    transition: transform 0.3s var(--transition-smooth), color 0.2s;
    flex-shrink: 0;
}
.cp-country.expanded .cp-expand { transform: rotate(180deg); color: var(--color-white); }
.cp-expand svg { width: 12px; height: 12px; }

.cp-regions {
    display: grid;
    grid-template-rows: 0fr;
    transition: grid-template-rows 0.35s var(--transition-smooth);
    overflow: hidden;
    margin-left: 1.65rem;
    border-left: 1px solid rgba(255,255,255,0.06);
}
.cp-country.expanded .cp-regions { grid-template-rows: 1fr; }
.cp-regions-inner {
    overflow: hidden;
    min-height: 0;
    padding-left: 0.5rem;
    padding-top: 0.15rem;
    padding-bottom: 0.4rem;
}

.cp-region {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    background: transparent;
    border: none;
    color: var(--color-silver-dim);
    cursor: pointer;
    padding: 0.45rem 0.7rem;
    border-radius: 6px;
    font-family: var(--font-display);
    font-size: 0.78rem;
    letter-spacing: 0.12em;
    transition: background 0.2s, color 0.2s;
    text-align: left;
}
.cp-region:hover { background: rgba(255,255,255,0.04); color: var(--color-white); }
.cp-region.selected {
    background: rgba(255,255,255,0.1);
    color: var(--color-white);
}
.cp-region-count {
    font-size: 0.62rem;
    letter-spacing: 0.2em;
    color: var(--color-silver-dim);
    text-transform: uppercase;
}

/* When picker mode is "country" or "region", the dot indicator on btn shows */

/* ── ACTIVE FILTER LABEL ── */
.active-filter {
    display: flex;
    align-items: baseline;
    gap: 1rem;
    margin-bottom: 1.5rem;
    font-family: var(--font-display);
    color: var(--color-silver-dim);
    font-size: 0.78rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    min-height: 1rem;
}
.active-filter-label { opacity: 0.6; }
.active-filter-value {
    color: var(--color-white);
    font-family: var(--font-display);
    font-size: 0.78rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    font-style: normal;
}
.active-filter-count {
    color: var(--color-silver-dim);
    font-family: 'SF Mono', 'Menlo', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
}

/* ── GALLERY (masonry 2-column) ── */
.gallery {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 1.5rem;
    position: relative;
}
.gallery-col {
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
}

.photo-item {
    position: relative;
    width: 100%;
    overflow: hidden;
    border-radius: 6px;
    background: var(--color-bg-alt);
    border: 1px solid rgba(255,255,255,0.05);
    box-shadow: 0 6px 22px rgba(0,0,0,0.45);
    cursor: pointer;
}
.photo-item.is-hidden { display: none; }

.photo-aspect {
    position: relative;
    width: 100%;
    overflow: hidden;
}
.photo-aspect img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transform: scale(1.04);
    transition: opacity 1s var(--transition-smooth), transform 8s var(--transition-smooth);
    display: block;
}
.photo-item.loaded .photo-aspect img.in-view {
    opacity: 1;
    transform: scale(1);
}
.photo-item:hover .photo-aspect img.in-view { transform: scale(1.06); transition: transform 1.6s var(--transition-smooth); }

.photo-meta {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    padding: 0.9rem 1rem 0.85rem;
    background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.85) 100%);
    color: var(--color-white);
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 0.75rem;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.35s var(--transition-smooth), transform 0.35s var(--transition-smooth);
    pointer-events: none;
}
.photo-item:hover .photo-meta { opacity: 1; transform: translateY(0); }
.photo-date {
    font-family: var(--font-display);
    font-size: 0.78rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
}
.photo-day {
    font-family: 'SF Mono', 'Menlo', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--color-silver);
    text-transform: uppercase;
}

/* Film perforation accent on each photo (subtle, top-left) */
.photo-num {
    position: absolute;
    top: 10px; left: 12px;
    font-family: 'SF Mono', 'Menlo', monospace;

</head>
<body>

<div class="noise-overlay"></div>

<main class="log-page" data-screen-label="03 Craft">

    <!-- Header -->
    <div class="craft-head">
        <h1 class="log-title">Craft</h1>
        <span class="craft-count" id="craftCount"></span>
    </div>

    <!-- Gallery -->
    <div class="gallery" id="gallery">
        <!-- columns injected by JS -->
    </div>
    <div class="gallery-empty" id="galleryEmpty">Still building this</div>

    <section class="site-search-panel" data-site-search aria-label="Site search"></section>

</main>

<footer class="footer-min" aria-hidden="true">
    <div class="footer-line"></div>
</footer>

<script>
/* ====================================================================
   Craft — flat portfolio list (no categories).
   ==================================================================== */

// ── 新增作品：在陣列裡加一行即可 ──────────────
// work('作品名稱', '年份', '副檔名')
//   檔名格式：作品名（多字用 - 連接，會顯示成空格），例如 OptionPricing
//   年份：選填，例如 '2026'
//   副檔名：選填，有填才會變成可點擊連結（檔案放 files/craft/），例如 'pdf'
function work(filename, year = '', fileExt = '') {
    const name = filename.replace(/-/g, ' ');
    const src  = fileExt ? `files/craft/${filename}.${fileExt}` : '';
    return { id: filename, name, year, src };
}

const WORKS = [
    // 範例（刪掉這行，加你自己的）：
    // work('OptionPricing', '2026', 'pdf'),
    // work('MyWebsite', '2026'),
];

const pad2 = (n) => String(n).padStart(2, '0');

function buildGallery() {
    const gallery = document.getElementById('gallery');
    gallery.innerHTML = '';
    WORKS.forEach(w => {
        const item = document.createElement('div');
        item.className = 'portfolio-item';
        item.dataset.id = w.id;
        item.innerHTML = `
            <span class="portfolio-year">${w.year}</span>
            <div class="portfolio-name-block">
                <h3 class="portfolio-name">${w.name}</h3>
            </div>
            <span class="portfolio-chevron" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 6l6 6-6 6"/>
                </svg>
            </span>
        `;
        if (w.src) {
            item.style.cursor = 'pointer';
            item.addEventListener('click', () => window.open(w.src, '_blank'));
        }
        gallery.appendChild(item);
    });
    gallery.appendChild(document.getElementById('galleryEmpty'));
}

document.addEventListener('DOMContentLoaded', () => {
    buildGallery();
    const countEl = document.getElementById('craftCount');
    if (countEl) countEl.textContent = WORKS.length ? `${pad2(WORKS.length)} ${WORKS.length === 1 ? 'work' : 'works'}` : '';
    document.getElementById('galleryEmpty').classList.toggle('show', WORKS.length === 0);
});
</script>

</body>
